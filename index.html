<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#00E0A4" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="VitalSync" />
<meta name="description" content="VitalSync — Your body. In sync. Saúde, treinos e nutrição premium." />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
<link rel="apple-touch-icon" href="assets/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
<title>VitalSync — Your body. In sync.</title>
<style>
/* =================================================================
   RESET
   ================================================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
img, picture, video, canvas, svg { display: block; max-width: 100%; }
input, button, textarea, select { font: inherit; color: inherit; }
button { background: none; border: none; cursor: pointer; }
a { color: inherit; text-decoration: none; }
ul, ol { list-style: none; }

/* =================================================================
   DESIGN TOKENS
   ================================================================= */
:root {
  /* Brand */
  --primary: #00E0A4;
  --primary-dark: #00B383;
  --primary-container: #003D2E;
  --on-primary: #003827;
  --secondary: #8B5CF6;
  --secondary-container: #2E1065;
  --tertiary: #FF6B6B;
  --tertiary-container: #4A0F0F;
  /* Surfaces dark */
  --bg: #07090D;
  --surface: #0E1116;
  --surface-container: #161A22;
  --surface-container-high: #1E222C;
  --outline: #262B36;
  --on-surface: #E6E8EC;
  --on-surface-variant: #A0A4AD;
  /* Status */
  --success: #22C55E;
  --warning: #F59E0B;
  --error: #EF4444;
  --info: #3B82F6;
  /* Macros */
  --macro-p: #00E0A4;
  --macro-c: #FFB547;
  --macro-f: #8B5CF6;
  --macro-fib: #7C8DA5;
  /* Glass */
  --glass: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.08);
  /* Radius */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-2xl: 24px;
  --r-3xl: 32px;
  --r-pill: 999px;
  /* Spacing */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 20px;
  --s-6: 24px;
  --s-7: 32px;
  --s-8: 40px;
  --s-9: 48px;
  --s-10: 64px;
  /* Motion */
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --dur-fast: 200ms;
  --dur: 350ms;
  --dur-slow: 600ms;
  /* Shadows */
  --shadow-glow: 0 8px 32px rgba(0, 224, 164, 0.25);
  --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.3);
  --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.4);
  /* Gradients */
  --grad-brand: linear-gradient(135deg, #00E0A4 0%, #8B5CF6 100%);
  --grad-fade-down: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%);
  /* Safe areas iOS */
  --safe-top: env(safe-area-inset-top, 0);
  --safe-bottom: env(safe-area-inset-bottom, 0);
}
[data-theme="light"] {
  --bg: #FAFBFC;
  --surface: #FFFFFF;
  --surface-container: #F4F5F7;
  --surface-container-high: #EAECEF;
  --outline: #E4E6EB;
  --on-surface: #0E1116;
  --on-surface-variant: #4B5160;
  --glass: rgba(255,255,255,0.6);
  --glass-border: rgba(255,255,255,0.4);
  --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.08);
  --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.1);
  --primary-container: #B8F5DC;
  --secondary-container: #EDE9FE;
  --tertiary-container: #FEE2E2;
  --on-primary: #FFFFFF;
}

/* =================================================================
   BASE
   ================================================================= */
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--on-surface);
  font-size: 15px;
  line-height: 1.5;
  overflow-x: hidden;
  overscroll-behavior-y: none;
  min-height: 100vh;
  min-height: 100dvh;
}
.display, h1, h2, h3 {
  font-family: 'Plus Jakarta Sans', sans-serif;
  letter-spacing: -0.02em;
  font-weight: 700;
}
h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em; }
h2 { font-size: 1.875rem; font-weight: 700; }
h3 { font-size: 1.5rem; font-weight: 700; }
h4 { font-size: 1.25rem; font-weight: 600; }
.num { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
.muted { color: var(--on-surface-variant); }
.small { font-size: 0.8125rem; }
.tiny { font-size: 0.6875rem; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
.center { text-align: center; }

/* =================================================================
   APP SHELL
   ================================================================= */
#app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
  position: relative;
  max-width: 480px;
  margin: 0 auto;
  background: var(--bg);
  box-shadow: 0 0 60px rgba(0,0,0,0.5);
}
@media (min-width: 768px) {
  #app { max-width: 480px; }
}

/* Page container */
.page {
  flex: 1;
  padding: calc(var(--safe-top) + var(--s-4)) var(--s-4) calc(80px + var(--safe-bottom) + var(--s-4));
  animation: pageIn var(--dur) var(--ease) both;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Top bar */
.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: calc(var(--safe-top) + var(--s-3)) var(--s-4) var(--s-3);
  background: color-mix(in srgb, var(--bg) 80%, transparent);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--outline);
}
.topbar h2 { font-size: 1.25rem; font-weight: 700; }
.topbar-actions { display: flex; gap: var(--s-2); }

/* Bottom nav */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 480px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: var(--s-2) var(--s-2) calc(var(--safe-bottom) + var(--s-2));
  background: color-mix(in srgb, var(--surface) 90%, transparent);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--outline);
  z-index: 50;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: var(--s-2);
  color: var(--on-surface-variant);
  border-radius: var(--r-lg);
  transition: all var(--dur-fast) var(--ease);
  font-size: 0.6875rem;
  font-weight: 600;
}
.nav-item.active { color: var(--primary); }
.nav-item.active .nav-icon { background: var(--primary-container); }
.nav-icon {
  width: 44px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--r-md);
  transition: all var(--dur-fast) var(--ease);
}
.nav-icon svg { width: 22px; height: 22px; }

/* =================================================================
   COMPONENTS
   ================================================================= */
/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--outline);
  border-radius: var(--r-2xl);
  padding: var(--s-5);
  position: relative;
  overflow: hidden;
}
.card-glass {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-2xl);
  padding: var(--s-5);
  box-shadow: var(--shadow-glass);
}
.card-gradient {
  background: var(--grad-brand);
  border-radius: var(--r-2xl);
  padding: var(--s-6);
  color: #fff;
  box-shadow: var(--shadow-glow);
  position: relative;
  overflow: hidden;
}
.card-gradient::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 80% 0%, rgba(255,255,255,0.2) 0%, transparent 50%);
  pointer-events: none;
}

/* Button */
.btn {
  display: inline-flex;
  align-items: center; justify-content: center;
  gap: var(--s-2);
  padding: 0 var(--s-6);
  height: 52px;
  border-radius: var(--r-lg);
  font-weight: 600;
  font-size: 0.9375rem;
  transition: all var(--dur-fast) var(--ease);
  white-space: nowrap;
  position: relative;
  overflow: hidden;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--primary); color: var(--on-primary); }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: var(--secondary); color: #fff; }
.btn-tonal { background: var(--primary-container); color: var(--primary); }
.btn-outline { background: transparent; color: var(--on-surface); border: 1px solid var(--outline); }
.btn-ghost { background: transparent; color: var(--on-surface); }
.btn-danger { background: var(--error); color: #fff; }
.btn-full { width: 100%; }
.btn-sm { height: 40px; padding: 0 var(--s-4); font-size: 0.875rem; }
.btn-icon { width: 44px; height: 44px; padding: 0; }
.btn svg { width: 20px; height: 20px; }
.btn:disabled { opacity: 0.5; pointer-events: none; }
.btn.loading .btn-text { opacity: 0; }
.btn.loading::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border: 2px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* FAB */
.fab {
  position: fixed;
  bottom: calc(80px + var(--safe-bottom) + var(--s-4));
  right: calc(50% - 220px);
  width: 56px; height: 56px;
  border-radius: var(--r-pill);
  background: var(--grad-brand);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-glow);
  z-index: 40;
  transition: transform var(--dur-fast) var(--ease);
}
.fab:active { transform: scale(0.92); }
@media (max-width: 480px) { .fab { right: var(--s-4); } }

/* Input */
.field { display: flex; flex-direction: column; gap: var(--s-2); margin-bottom: var(--s-4); }
.field label { font-size: 0.8125rem; font-weight: 600; color: var(--on-surface); }
.input {
  display: flex; align-items: center; gap: var(--s-3);
  background: var(--surface-container);
  border: 1px solid transparent;
  border-radius: var(--r-lg);
  padding: 0 var(--s-4);
  height: 52px;
  transition: all var(--dur-fast) var(--ease);
}
.input:focus-within { border-color: var(--primary); background: var(--surface); }
.input input, .input textarea, .input select {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 0.9375rem;
}
.input input::placeholder { color: var(--on-surface-variant); }
.input-icon { color: var(--on-surface-variant); display: flex; }
.input-icon svg { width: 18px; height: 18px; }
.input-suffix { color: var(--on-surface-variant); font-size: 0.875rem; }
.input textarea { resize: none; padding: var(--s-3) 0; min-height: 80px; }
.input.error { border-color: var(--error); }
.field-error { color: var(--error); font-size: 0.75rem; margin-top: 2px; }

/* Chip */
.chip {
  display: inline-flex; align-items: center; gap: var(--s-1);
  padding: var(--s-1) var(--s-3);
  background: var(--surface-container);
  border-radius: var(--r-pill);
  font-size: 0.8125rem;
  font-weight: 500;
  white-space: nowrap;
  transition: all var(--dur-fast) var(--ease);
}
.chip.active { background: var(--primary); color: var(--on-primary); }
.chip-row { display: flex; gap: var(--s-2); overflow-x: auto; padding-bottom: var(--s-2); -webkit-overflow-scrolling: touch; }
.chip-row::-webkit-scrollbar { display: none; }

/* Avatar */
.avatar {
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--grad-brand);
  color: #fff;
  font-weight: 700;
  flex-shrink: 0;
  text-transform: uppercase;
}

/* Progress */
.progress {
  height: 6px;
  background: var(--surface-container-high);
  border-radius: var(--r-pill);
  overflow: hidden;
  position: relative;
}
.progress-bar {
  height: 100%;
  background: var(--primary);
  border-radius: var(--r-pill);
  transition: width var(--dur) var(--ease);
}

/* Toast / Snackbar */
.toast {
  position: fixed;
  bottom: calc(100px + var(--safe-bottom));
  left: 50%; transform: translateX(-50%);
  background: var(--surface-container-high);
  color: var(--on-surface);
  padding: var(--s-3) var(--s-5);
  border-radius: var(--r-pill);
  font-size: 0.875rem;
  z-index: 200;
  box-shadow: var(--shadow-card);
  animation: toastIn var(--dur) var(--ease);
  display: flex; align-items: center; gap: var(--s-2);
}
@keyframes toastIn { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 100;
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn var(--dur-fast) var(--ease);
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface);
  border-top-left-radius: var(--r-3xl);
  border-top-right-radius: var(--r-3xl);
  width: 100%; max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  padding: var(--s-5) var(--s-4) calc(var(--safe-bottom) + var(--s-5));
  animation: slideUp var(--dur) var(--ease);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 36px; height: 4px; background: var(--outline); border-radius: var(--r-pill); margin: 0 auto var(--s-4); }

/* Toast */
.snackbar {
  position: fixed;
  bottom: calc(90px + var(--safe-bottom));
  left: 50%; transform: translateX(-50%);
  background: var(--surface-container-high);
  color: var(--on-surface);
  padding: var(--s-3) var(--s-5);
  border-radius: var(--r-lg);
  font-size: 0.875rem;
  z-index: 200;
  box-shadow: var(--shadow-card);
  display: flex; align-items: center; gap: var(--s-2);
  max-width: 90%;
  animation: toastIn var(--dur) var(--ease);
}
.snackbar.error { background: var(--error); color: #fff; }
.snackbar.success { background: var(--success); color: #fff; }

/* Tabbar */
.tabs {
  display: flex;
  gap: 2px;
  background: var(--surface-container);
  padding: 4px;
  border-radius: var(--r-lg);
  margin-bottom: var(--s-4);
}
.tab {
  flex: 1;
  padding: var(--s-2) var(--s-3);
  border-radius: var(--r-md);
  font-size: 0.875rem;
  font-weight: 600;
  text-align: center;
  color: var(--on-surface-variant);
  transition: all var(--dur-fast) var(--ease);
}
.tab.active { background: var(--surface); color: var(--on-surface); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

/* List */
.list { display: flex; flex-direction: column; gap: var(--s-2); }
.list-item {
  display: flex; align-items: center; gap: var(--s-3);
  padding: var(--s-3) var(--s-4);
  background: var(--surface);
  border: 1px solid var(--outline);
  border-radius: var(--r-lg);
  transition: all var(--dur-fast) var(--ease);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.list-item:active { transform: scale(0.99); background: var(--surface-container); }
.list-item-icon {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface-container);
  border-radius: var(--r-md);
  color: var(--primary);
}
.list-item-icon svg { width: 20px; height: 20px; }
.list-item-content { flex: 1; min-width: 0; }
.list-item-title { font-weight: 600; font-size: 0.9375rem; }
.list-item-sub { font-size: 0.8125rem; color: var(--on-surface-variant); }
.list-item-action { color: var(--on-surface-variant); }

/* Stat grid */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--s-3);
}
.stat-tile {
  background: var(--surface);
  border: 1px solid var(--outline);
  border-radius: var(--r-xl);
  padding: var(--s-4);
  display: flex; flex-direction: column;
  gap: var(--s-2);
  position: relative;
  overflow: hidden;
}
.stat-tile-icon {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--r-md);
  font-size: 0;
}
.stat-tile-icon svg { width: 16px; height: 16px; }
.stat-tile-label { font-size: 0.75rem; color: var(--on-surface-variant); font-weight: 500; }
.stat-tile-value { font-size: 1.5rem; font-weight: 800; line-height: 1.1; display: flex; align-items: baseline; gap: 2px; }
.stat-tile-value .unit { font-size: 0.75rem; color: var(--on-surface-variant); font-weight: 500; }

/* Section header */
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin: var(--s-6) 0 var(--s-3);
}
.section-head h3 { font-size: 1.125rem; }
.section-head a { color: var(--primary); font-size: 0.875rem; font-weight: 600; }

/* Macro bar */
.macro-row { margin-bottom: var(--s-3); }
.macro-head { display: flex; justify-content: space-between; margin-bottom: var(--s-1); font-size: 0.8125rem; }
.macro-head strong { font-weight: 700; }
.macro-bar { height: 8px; background: var(--surface-container-high); border-radius: var(--r-pill); overflow: hidden; }
.macro-fill { height: 100%; border-radius: var(--r-pill); transition: width var(--dur) var(--ease); }

/* Score circle */
.score-ring {
  width: 120px; height: 120px;
  position: relative;
}
.score-ring svg { transform: rotate(-90deg); }
.score-ring circle { fill: none; stroke-width: 10; }
.score-ring .track { stroke: var(--outline); }
.score-ring .fill { stroke: url(#scoreGrad); stroke-linecap: round; transition: stroke-dashoffset var(--dur-slow) var(--ease); }
.score-ring .label {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

/* =================================================================
   AUTH PAGES
   ================================================================= */
.auth-page {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex; flex-direction: column;
  padding: var(--s-8) var(--s-5) var(--s-5);
}
.auth-logo {
  width: 90px; height: 90px;
  background: var(--grad-brand);
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  margin: var(--s-9) auto var(--s-6);
  color: #fff; font-size: 48px;
  box-shadow: var(--shadow-glow);
  animation: scaleIn var(--dur-slow) var(--ease);
}
@keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.auth-form { max-width: 360px; margin: 0 auto; width: 100%; }
.auth-foot { text-align: center; margin-top: var(--s-5); }
.auth-foot a { color: var(--primary); font-weight: 600; }

/* =================================================================
   ONBOARDING
   ================================================================= */
.onb-page {
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
  padding: var(--s-5) var(--s-5) calc(var(--safe-bottom) + var(--s-5));
}
.onb-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: var(--s-5); }
.onb-icon {
  width: 160px; height: 160px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 40px;
  display: flex; align-items: center; justify-content: center;
  font-size: 80px;
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
.onb-dots { display: flex; gap: var(--s-2); justify-content: center; margin: var(--s-5) 0; }
.onb-dot { width: 8px; height: 8px; border-radius: var(--r-pill); background: var(--outline); transition: all var(--dur); }
.onb-dot.active { background: var(--primary); width: 28px; }

/* =================================================================
   SPLASH
   ================================================================= */
.splash {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;

    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'data' && typeof v === 'object') for (const [dk, dv] of Object.entries(v)) e.dataset[dk] = dv;
    else if (v === true) e.setAttribute(k, '');
    else if (v === false || v == null) {}
    else e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.append(c.nodeType ? c : document.createTextNode(String(c)));
  }
  return e;
};
const icon = (name, size = 20) => {
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', size);
  svg.setAttribute('height', size);
  const use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
  use.setAttributeNS('http://www.w3.org/1999/xlink', 'href', `#i-${name}`);
  use.setAttribute('href', `#i-${name}`);
  svg.appendChild(use);
  return svg;
};
const fmt = {
  number: (n, d = 0) => Number(n || 0).toLocaleString('pt-PT', { minimumFractionDigits: d, maximumFractionDigits: d }),
  kcal: (n) => `${fmt.number(n)} kcal`,
  date: (d) => new Date(d).toLocaleDateString('pt-PT', { weekday: 'long', day: 'numeric', month: 'long' }),
  time: (d) => new Date(d).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' }),
  dateShort: (d) => new Date(d).toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit' }),
  duration: (sec) => {
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
    if (h) return `${h}h ${String(m).padStart(2, '0')}m`;
    if (m) return `${m}m ${String(s).padStart(2, '0')}s`;
    return `${s}s`;
  },
  greeting: () => {
    const h = new Date().getHours();
    if (h < 5) return 'Olá';
    if (h < 12) return 'Bom dia';
    if (h < 18) return 'Boa tarde';
    return 'Boa noite';
  }
};

const Storage = {
  get(key, fallback = null) {
    try {
      const v = localStorage.getItem(`vitalsync.${key}`);
      return v == null ? fallback : JSON.parse(v);
    } catch { return fallback; }
  },
  set(key, val) {
    try { localStorage.setItem(`vitalsync.${key}`, JSON.stringify(val)); } catch {}
  },
  remove(key) { localStorage.removeItem(`vitalsync.${key}`); }
};

const State = {
  user: Storage.get('user'),

const subscribe = (fn) => { subs.add(fn); return () => subs.delete(fn); };

let currentRoute = null;
let currentParams = {};

function navigate(path, params = {}) {
  if (path !== currentRoute) {
    history.pushState({ path, params }, '', path);
    currentRoute = path;
    currentParams = params;
    render();
  }
}

function render() {
  const app = $('#app');
  if (!app) return;
  // Guard: precisa de login
  const publicRoutes = ['/splash', '/onboarding', '/login', '/register'];
  if (!State.user && !publicRoutes.includes(currentRoute)) {
    return navigate('/splash');
  }
  // Guard: precisa de setup de perfil
  const profileComplete = State.user?.heightCm && State.user?.birthDate;
  if (State.user && !profileComplete && currentRoute !== '/profile-setup' && !publicRoutes.includes(currentRoute)) {
    return navigate('/profile-setup');
  }
  const handler = routes[currentRoute] || routes['/splash'];
  app.innerHTML = '';
  app.append(renderTopbar());
  app.append(handler());
  if (State.user) app.append(renderBottomNav());
  // Scroll to top
  const page = $('.page');
  if (page) page.scrollTop = 0;
}

function toast(message, type = 'default') {
  const t = el('div', { class: `snackbar ${type}` }, message);
  document.body.append(t);
  setTimeout(() => t.remove(), 2500);
}

function modal(content) {
  const close = () => backdrop.remove();
  const backdrop = el('div', { class: 'modal-backdrop', onClick: (e) => e.target === backdrop && close() },
    el('div', { class: 'modal' },
      el('div', { class: 'modal-handle' }),
      typeof content === 'function' ? content(close) : content
    )
  );
  document.body.append(backdrop);
  return close;
}

function confirmModal(message, onConfirm) {
  return modal((close) => el('div', {},
    el('h3', { class: 'mb-3', text: 'Confirmar' }),
    el('p', { class: 'muted mb-5', text: message }),
    el('div', { class: 'row gap-2' },
      el('button', { class: 'btn btn-outline btn-full', onClick: close, text: 'Cancelar' }),
      el('button', { class: 'btn btn-primary btn-full', onClick: () => { onConfirm(); close(); }, text: 'Confirmar' })
    )
  ));
}

    };
    State.setUser(updated);
    // Recalcular goals baseado no objetivo
    const t = calcTDEE(updated);
    const g = { ...State.goals };
    g.dailyKcal = Math.round(t);
    if (data.goal === 'gainMuscle' || data.goal === 'gainWeight') g.dailyKcal += 300;
    if (data.goal === 'loseWeight') g.dailyKcal -= 400;
    g.dailyProtein = Math.round(updated.weightKg * 2);
    g.dailyCarbs = Math.round((g.dailyKcal * 0.45) / 4);
    g.dailyFat = Math.round((g.dailyKcal * 0.25) / 9);
    State.setGoals(g);
    toast('Perfil criado!', 'success');
    navigate('/main/home');
  }
  function fieldNumber(label, placeholder, onInput) {
    return el('div', { class: 'field' },
      el('label', { text: label }),
      el('div', { class: 'input' },
        el('input', { type: 'number', placeholder, onInput: (e) => onInput(e.target.value) })
      )
    );
  }
  function calcTDEE(u) {
    if (!u.weightKg || !u.heightCm || !u.birthDate) return 2000;
    const age = new Date().getFullYear() - new Date(u.birthDate).getFullYear();
    const base = 10 * u.weightKg + 6.25 * u.heightCm - 5 * age;
    const sexAdj = u.sex === 'male' ? 5 : u.sex === 'female' ? -161 : -78;
    const bmr = base + sexAdj;
    const mult = activities.find(a => a.v === u.activityLevel)?.m || 1.55;
    return Math.round(bmr * mult);
  }
  show(0);
  return container;
}

function calcScore() {
  const meals = State.meals.filter(m => m.date === todayKey());
  const t = meals.reduce((a, m) => ({ kcal: a.kcal + m.kcal, p: a.p + m.protein }), { kcal: 0, p: 0 });
  const waterMl = State.water[todayKey()] || 0;
  let score = 50;
  if (t.kcal > State.goals.dailyKcal * 0.8) score += 15;
  if (t.p > State.goals.dailyProtein * 0.7) score += 10;
  if (waterMl > State.goals.dailyWaterMl * 0.5) score += 10;
  const today = new Date().toDateString();
  const hasWorkout = State.workouts.some(w => new Date(w.startedAt).toDateString() === today);
  if (hasWorkout) score += 15;
  return Math.min(100, score);
}

  return el('svg', { viewBox: '0 0 300 100', style: { width: '100%', height: '120px' } },

      )
    ),

  return m[g] || '—';

function calcTDEEStatic(u) {
  if (!u.weightKg || !u.heightCm || !u.birthDate) return 2000;
  const age = new Date().getFullYear() - new Date(u.birthDate).getFullYear();
  const base = 10 * u.weightKg + 6.25 * u.heightCm - 5 * age;
  const sexAdj = u.sex === 'male' ? 5 : u.sex === 'female' ? -161 : -78;
  const bmr = base + sexAdj;
  const mult = { sedentary: 1.2, lightlyActive: 1.375, moderatelyActive: 1.55, veryActive: 1.725, extraActive: 1.9 }[u.activityLevel] || 1.55;
  return Math.round(bmr * mult);
}

function renderAiChat() {
  const messages = State.storage?.getItem('vitalsync.chat') ? JSON.parse(State.storage?.getItem('vitalsync.chat') || '[]') : [];
  const container = el('div', { class: 'chat-page' });
  const list = el('div', { class: 'chat-messages' });
  function save(m) { Storage.set('chat', m); }
  function add(role, text) {
    messages.push({ role, text, at: new Date().toISOString() });
    save(messages);
    render();
  }
  function quickQuestions() {
    return el('div', { style: { padding: '20px', textAlign: 'center' } },
      el('div', { class: 'mb-4' },
        el('div', { style: { fontSize: '48px' }, text: '🧠' }),
        el('h3', { class: 'display mb-2', text: 'AI Assistant' }),
        el('p', { class: 'muted', text: 'Pergunta-me qualquer coisa sobre saúde, treino ou nutrição' })
      ),
      el('div', { style: { display: 'flex', flexDirection: 'column', gap: '8px' } },
        ...[
          'Como posso perder peso de forma saudável?',
          'Quantas calorias devo consumir por dia?',
          'O que comer antes do treino?',
          'Como melhorar a qualidade do sono?',
          'Quantos dias por semana devo treinar?'
        ].map(q => el('button', { class: 'list-item', onClick: () => ask(q) }, el('div', { class: 'list-item-content' }, el('div', { class: 'list-item-title', text: q })), icon('arrow-right', 16)))
      )
    );
  }
  function render() {
    list.innerHTML = '';
    if (messages.length === 0) { list.append(quickQuestions()); return; }
    messages.forEach(m => list.append(el('div', { class: `msg ${m.role}` }, m.text)));
  }
  async function ask(q) {
    add('user', q);
    setTimeout(() => {
      const response = aiResponse(q);
      add('ai', response);
    }, 800);
  }
  function aiResponse(q) {
    const ql = q.toLowerCase();
    if (ql.includes('perder peso')) return 'Para perder peso de forma saudável, recomendo um défice calórico moderado (300-500 kcal/dia), alta ingestão de proteínas (2g/kg) e treino de força 3-4x por semana. A tua TDEE atual é de ' + calcTDEEStatic(State.user) + ' kcal.';
    if (ql.includes('calorias')) return `Com base no teu perfil, deves consumir cerca de ${State.goals.dailyKcal} kcal/dia para ${goalLabel(State.user.goal).toLowerCase()}. Proteína: ${State.goals.dailyProtein}g, Hidratos: ${State.goals.dailyCarbs}g, Gordura: ${State.goals.dailyFat}g.`;
    if (ql.includes('antes do treino')) return '1-2h antes do treino: hidratos complexos (arroz, aveia, batata) + proteína magra. 30min antes: banana ou fruta. Evita gorduras em excesso.';
    if (ql.includes('sono')) return 'Para melhorar o sono: horário fixo, evitar ecrãs 1h antes, quarto fresco (18-20°C), sem cafeína após as 14h. Tenta dormir 7-9h por noite.';
    if (ql.includes('treinar') || ql.includes('treino')) return `Recomendo 3-5x por semana, alternando grupos musculares. Para ti sugiro: Peito+Tríceps, Costas+Bíceps, Pernas+Ombros, Cardio HIIT. Descanso: 60-90s entre séries.`;
    return 'Pergunta interessante! Posso ajudar com nutrição, treinos, sono, calorias, e objetivos. Experimenta uma das sugestões acima. 💪';
  }
  render();
  let input = '';
  const inputEl = el('input', { placeholder: 'Pergunta qualquer coisa...', onInput: (e) => input = e.target.value, onKeyDown: (e) => e.key === 'Enter' && input.trim() && (ask(input), input = '', e.target.value = '') });
  container.append(
    el('div', { class: 'chat-header' },
      el('div', { class: 'row gap-2' },
        el('button', { class: 'btn btn-icon btn-ghost', onClick: () => history.back() }, icon('arrow-left', 22)),
        el('div', {},
          el('strong', { text: 'AI Assistant' }),
          el('div', { class: 'small muted', text: '🟢 Online' })
        )
      )
    ),
    list,
    el('div', { class: 'chat-input' },
      el('div', { class: 'input', style: { flex: 1 } }, inputEl),
      el('button', { class: 'btn btn-icon btn-primary', onClick: () => { if (input.trim()) { ask(input); input = ''; inputEl.value = ''; } } }, icon('arrow-right', 20))
    )
  );
  return container;
}
